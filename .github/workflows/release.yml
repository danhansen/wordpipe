name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libglib2.0-bin \
            pkg-config \
            python3 \
            python3-venv \
            zip

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python test dependencies
        run: |
          python3 -m venv .venv-ci
          .venv-ci/bin/python -m pip install --upgrade pip
          .venv-ci/bin/python -m pip install -e ".[model-tools]"

      - name: Run Rust tests
        run: cargo test --locked --workspace

      - name: Run Python tests
        run: PYTHONPATH=src .venv-ci/bin/python -m unittest discover -s tests

      - name: Check GNOME D-Bus XML
        run: .venv-ci/bin/python scripts/check_gnome_dbus_xml.py

      - name: Package release assets
        run: |
          version="${GITHUB_REF_NAME#v}"
          if [ "$GITHUB_REF_TYPE" != "tag" ]; then
            version="dev-${GITHUB_SHA::12}"
          fi
          scripts/package-wordpipe-release --version "$version" --output-dir dist

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wordpipe-release-assets
          path: dist/*

      - name: Publish GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
