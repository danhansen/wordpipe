app-id: dev.wordpipe.Wordpipe
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: wordpipe-flatpak-launch

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=pulseaudio
  - --share=network
  - --talk-name=org.freedesktop.portal.Desktop

cleanup:
  - /include
  - /lib/pkgconfig
  - /share/man
  - "*.a"
  - "*.la"

modules:
  # Generate and include vendored dependency source manifests before using this
  # for distribution:
  #   flatpak-cargo-generator Cargo.lock -o packaging/flatpak/cargo-sources.json
  - name: onnxruntime
    buildsystem: simple
    build-commands:
      - install -Dm755 lib/libonnxruntime.so.1.27.0 /app/lib/libonnxruntime.so.1.27.0
      - install -Dm755 lib/libonnxruntime_providers_shared.so /app/lib/libonnxruntime_providers_shared.so
      - ln -sf libonnxruntime.so.1.27.0 /app/lib/libonnxruntime.so.1
      - ln -sf libonnxruntime.so.1 /app/lib/libonnxruntime.so
    sources:
      - type: archive
        url: https://github.com/microsoft/onnxruntime/releases/download/v1.27.0/onnxruntime-linux-x64-1.27.0.tgz
        sha256: 547e40a48f1fe73e3f812d7c88a948612c23f896b91e4e2ee1e232d7b468246f

  - name: wordpipe-rust-worker
    buildsystem: simple
    build-options:
      build-args:
        - --share=network
      env:
        CARGO_HOME: /run/build/wordpipe-rust-worker/cargo
    build-commands:
      - cargo build --release -p wordpipe-parakeet-worker
      - install -Dm755 target/release/wordpipe-parakeet-worker /app/bin/wordpipe-parakeet-worker
    sources:
      - type: file
        path: ../../Cargo.toml
      - type: file
        path: ../../Cargo.lock
      - type: dir
        path: ../../crates
        dest: crates
      - type: dir
        path: ../../third_party
        dest: third_party
      # - packaging/flatpak/cargo-sources.json

  - name: wordpipe-model-tools
    buildsystem: simple
    build-options:
      build-args:
        - --share=network
    build-commands:
      - python3 -m pip install --prefix=/app --ignore-installed -r requirements-model-tools.txt
    sources:
      - type: file
        path: requirements-model-tools.txt

  - name: wordpipe-python
    buildsystem: simple
    build-options:
      build-args:
        - --share=network
    build-commands:
      - python3 -m pip install --no-build-isolation --prefix=/app .
      - install -dm755 /app/share/wordpipe/scripts
      - cp scripts/*.py /app/share/wordpipe/scripts/
      - chmod 755 /app/share/wordpipe/scripts/*.py
      - install -Dm755 packaging/flatpak/wordpipe-flatpak-launch /app/bin/wordpipe-flatpak-launch
      - install -Dm644 packaging/applications/dev.wordpipe.Wordpipe.desktop /app/share/applications/dev.wordpipe.Wordpipe.desktop
      - install -Dm644 packaging/metainfo/dev.wordpipe.Wordpipe.metainfo.xml /app/share/metainfo/dev.wordpipe.Wordpipe.metainfo.xml
      - for size in 16x16 24x24 32x32 48x48 64x64 128x128 256x256 512x512; do install -Dm644 packaging/icons/hicolor/$size/apps/dev.wordpipe.Wordpipe.png /app/share/icons/hicolor/$size/apps/dev.wordpipe.Wordpipe.png; done
    sources:
      - type: file
        path: ../../pyproject.toml
      - type: file
        path: ../../README.md
      - type: dir
        path: ../../src
        dest: src
        skip:
          - __pycache__
          - __pycache__/*
          - "*/__pycache__"
          - "*/__pycache__/*"
          - "*.pyc"
          - "*/*.pyc"
      - type: dir
        path: ../../scripts
        dest: scripts
        skip:
          - __pycache__
          - __pycache__/*
          - "*.pyc"
          - "*/*.pyc"
      - type: file
        path: ../../packaging/flatpak/wordpipe-flatpak-launch
        dest: packaging/flatpak
      - type: dir
        path: ../../packaging/applications
        dest: packaging/applications
      - type: dir
        path: ../../packaging/metainfo
        dest: packaging/metainfo
      - type: dir
        path: ../../packaging/icons
        dest: packaging/icons
